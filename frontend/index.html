<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hermes Agent 高阶功能深度挖掘</title>
    <!-- Font imports -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Inter:wght@300;400;600&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #2563EB;
            --accent-color-1: #06B6D4;
            --accent-color-2: #8B5CF6;
            --neutral-color: #64748B;
            --slide-background: linear-gradient(135deg, #0F172A 0%, #1E293B 50%, #0F172A 100%);
            --font-title: 'Montserrat', 'Noto Sans SC', sans-serif;
            --font-body: 'Inter', 'Noto Sans SC', sans-serif;
        }
    </style>
    <style>
        .nav-btn, .page-indicator {
            display: none;
        }
    </style>
    <script>
        // # 禁止修改
        window.slideDataMap = new Map();
    </script>
</head>
<body>
    <!-- PPT 容器 -->
    <div class="ppt-container">
        <div class="ppt-viewport" id="ppt-viewport">
            <!-- 幻灯片将由 JavaScript 动态插入 -->
        </div>
    </div>

    <!-- 导航按钮 -->
    <button class="nav-btn nav-btn-prev" id="prevBtn" aria-label="上一页">
        ←
    </button>
    <button class="nav-btn nav-btn-next" id="nextBtn" aria-label="下一页">
        →
    </button>

    <!-- 进度条 -->
    <div class="progress-bar">
        <div class="progress-bar-fill" id="progressBarFill"></div>
    </div>

    <!-- 页码指示器 -->
    <div class="page-indicator" id="pageIndicator">
        1 / 1
    </div>

    <!-- Vite Main Entry -->
    <script type="module" src="/src/main.js"></script>
